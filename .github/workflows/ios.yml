name: iOS Build & Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Show signing info
        run: |
          echo "=== Xcode ==="
          xcodebuild -version
          echo "=== Build Settings ==="
          xcodebuild -project test01.xcodeproj -scheme test01 -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_IDENTITY" || true
          echo "=== Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles || true
          echo "=== Code Signing Identities ==="
          security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Archive
        run: |
          xcodebuild \
            -project test01.xcodeproj \
            -scheme test01 \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/test01.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=3H69R3G362 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="test01_appstore" \
            PRODUCT_BUNDLE_IDENTIFIER="com.cmchat.CMChatDemo" \
            clean archive

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>3H69R3G362</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.cmchat.CMChatDemo</key>
              <string>test01_appstore</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/test01.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 <<EOF
          ${{ secrets.APPSTORE_PRIVATE_KEY }}
          EOF
          ls -la ~/.appstoreconnect/private_keys

      - name: Upload to App Store Connect
        run: |
          set -e
          
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -n 1)
          echo "IPA_PATH=$IPA_PATH"
          
          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "IPA file not found"
            exit 1
          fi

          xcrun --find iTMSTransporter || true
          xcodebuild -version

          if xcrun --find iTMSTransporter >/dev/null 2>&1; then
            TRANSPORTER_BIN=$(xcrun --find iTMSTransporter)
            echo "Using transporter: $TRANSPORTER_BIN"
            "$TRANSPORTER_BIN" \
              -m upload \
              -assetFile "$IPA_PATH" \
              -apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
              -apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
          else
            echo "iTMSTransporter not found, fallback to altool"
            xcrun altool --upload-app \
              -f "$IPA_PATH" \
              -t ios \
              --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
              --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}"
          fi
