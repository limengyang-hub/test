name: iOS Build & Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 \( -name "*.xcodeproj" -o -name "*.xcworkspace" \)

      - name: Show project schemes
        run: |
          xcodebuild -list -project test01.xcodeproj

      - name: Build without signing
        run: |
          xcodebuild \
            -project test01.xcodeproj \
            -scheme test01 \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            clean build
