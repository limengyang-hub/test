name: iOS Build & Upload

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 选择 Xcode（解决你之前 future format 问题）
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          xcodebuild -version

      # ✅ 安装证书 + profile
      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e

          CERT_PATH="$RUNNER_TEMP/dist.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ✅ Debug信息（关键）
      - name: Show signing info
        run: |
          echo "=== Xcode ==="
          xcodebuild -version

          echo "=== Build Settings ==="
          xcodebuild -project test01.xcodeproj -scheme test01 -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_IDENTITY" || true

          echo "=== Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles || true

          echo "=== Code Signing Identities ==="
          security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" || true

      # ✅ Archive
      - name: Archive
        run: |
          set -e
          xcodebuild \
            -project test01.xcodeproj \
            -scheme test01 \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/test01.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=3H69R3G362 \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="test01_appstore" \
            PRODUCT_BUNDLE_IDENTIFIER="com.cmchat.CMChatDemo" \
            clean archive

      # ✅ 导出 IPA（已修复）
      - name: Export IPA
        run: |
          set -e

          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>3H69R3G362</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.cmchat.CMChatDemo</key>
              <string>test01_appstore</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/test01.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

          echo "=== Exported files ==="
          ls -la "$RUNNER_TEMP/export"
          find "$RUNNER_TEMP/export"

      # ✅ 修复 .p8 写入问题（你刚刚卡的点）
      - name: Setup App Store Connect API Key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
        run: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          printf "%s" "$APPSTORE_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

          echo "=== API Key Files ==="
          ls -la ~/.appstoreconnect/private_keys
          wc -l ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      # ✅ 最终上传（稳定版）
      - name: Upload to App Store Connect
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -e

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -n 1)
          echo "IPA_PATH=$IPA_PATH"

          if [ -z "$IPA_PATH" ] || [ ! -f "$IPA_PATH" ]; then
            echo "IPA file not found"
            exit 1
          fi

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
